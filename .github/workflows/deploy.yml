name: Deploy (Vercel)

# Auto-deploy: production on merge to main, a preview URL for every PR.
# Requires three repo secrets — see README "Deployment":
#   VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
# And the HF_TOKEN Environment Variable set inside the Vercel project.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Skip if Vercel isn't wired up yet, so the repo is still pushable.
    if: ${{ github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - name: Check Vercel is configured
        id: guard
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Vercel secrets not set yet — skipping deploy. Add VERCEL_TOKEN / VERCEL_ORG_ID / VERCEL_PROJECT_ID to enable."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.guard.outputs.configured == 'true'
        uses: actions/checkout@v4
      - if: steps.guard.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Vercel CLI
        if: steps.guard.outputs.configured == 'true'
        run: npm i -g vercel@latest
      - name: Resolve environment
        if: steps.guard.outputs.configured == 'true'
        id: env
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "target=production" >> "$GITHUB_OUTPUT"
            echo "prod_flag=--prod" >> "$GITHUB_OUTPUT"
          else
            echo "target=preview" >> "$GITHUB_OUTPUT"
            echo "prod_flag=" >> "$GITHUB_OUTPUT"
          fi
      - name: Pull Vercel project settings
        if: steps.guard.outputs.configured == 'true'
        run: vercel pull --yes --environment=${{ steps.env.outputs.target }} --token=${{ secrets.VERCEL_TOKEN }}
      - name: Build
        if: steps.guard.outputs.configured == 'true'
        run: vercel build ${{ steps.env.outputs.prod_flag }} --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy
        if: steps.guard.outputs.configured == 'true'
        run: |
          URL=$(vercel deploy --prebuilt ${{ steps.env.outputs.prod_flag }} --token=${{ secrets.VERCEL_TOKEN }})
          echo "Deployed to $URL"
          echo "### Deployed :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "$URL" >> "$GITHUB_STEP_SUMMARY"
